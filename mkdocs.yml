site_name: Limitless Organizer Tracker
site_description: Tracks Limitless TCG organizer-application status and platform-wide organizer onboarding activity.
repo_url: https://github.com/GenNetEng/limitless-organizer-tracker
repo_name: GenNetEng/limitless-organizer-tracker
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Project:
      - Overview: index.md
      - Architecture: architecture.md
      - Requirements: requirements.md
  - Development:
      - Getting Started: getting-started.md
      - Developer Guide: developer-guide.md
      - Configuration: configuration.md
      - API Reference: api.md
  - Deployment:
      - Local: deployment/local.md
      - Staging: deployment/staging.md
      - Production: deployment/production.md
      - Helm Reference: deployment/helm.md
