<!DOCTYPE html>
<html>
  <body>
    <div class="main">
      <div class="container content">
        <div class="organizer-application" data-id="69256ff752eafbbc81177f6a">
          <h1>Become an Organizer</h1>
          <div class="status alert info">
            <div class="code">Status: <span class="bold">pending</span></div>
          </div>
          <div class="response"></div>
          <form class="page1" style="display: none">
            <div class="buttons">
              <button class="continue">Continue</button>
            </div>
          </form>
          <div class="page2" style="display: none">
            <div class="buttons">
              <button class="return">Back</button>
              <button class="submit">Resubmit</button>
              <button class="delete">Delete</button>
            </div>
          </div>
          <div class="page3 alert success">
            <a class="apl-link"></a>
            Thanks for submitting an organizer application! You can check the application status in your
            <a href="/account/settings/orgs">account settings</a>
            or by opening the link above.
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
