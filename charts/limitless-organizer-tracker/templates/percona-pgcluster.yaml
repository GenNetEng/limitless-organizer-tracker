{{- if .Values.percona.enabled }}
apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: {{ .Values.percona.clusterName }}
  labels:
    {{- include "lot.labels" . | nindent 4 }}
spec:
  crVersion: "3.0.0"
  image: percona/percona-postgresql-operator:3.0.0-ppg16-postgres
  postgresVersion: {{ .Values.percona.pgVersion | int }}
  instances:
    - name: instance1
      replicas: 1
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.percona.storageSize }}
  {{- if not .Values.percona.disableBackups }}
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: {{ .Values.percona.storageSize }}
  {{- end }}
  users:
    - name: limitless
      databases:
        - limitless_tracker
      options: "SUPERUSER"
{{- end }}
