apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lot.fullname" . }}-config
  labels:
    {{- include "lot.labels" . | nindent 4 }}
data:
  CORS_ALLOWED_ORIGINS: {{ .Values.backend.env.CORS_ALLOWED_ORIGINS | quote }}
  LIMITLESS_BASE_URL: {{ .Values.backend.env.LIMITLESS_BASE_URL | quote }}
