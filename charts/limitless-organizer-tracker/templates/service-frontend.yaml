apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "lot.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: {{ .Values.frontend.port }}
