defaultNamespace: limitless-staging

helm:
  chart: ../charts/limitless-organizer-tracker
  releaseName: limitless-staging
  valuesFiles:
    - ../charts/limitless-organizer-tracker/values.yaml
    - ../charts/limitless-organizer-tracker/values.staging.yaml

targetCustomizations:
  - name: local
    clusterSelector:
      matchLabels:
        management.cattle.io/cluster-display-name: local
